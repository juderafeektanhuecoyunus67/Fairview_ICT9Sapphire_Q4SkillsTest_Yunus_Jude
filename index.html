<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nut School Brain Developmental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

    <div class="container main-wrapper shadow-lg p-0">
        <header class="p-3 border-bottom bg-white d-flex align-items-center">
            <img src="https://via.placeholder.com/50" alt="Logo" class="me-2">
            <h6 class="m-0 fw-bold text-brown">NUT SCHOOL BRAIN <br><small>DEVELOPMENTAL</small></h6>
        </header>

        <div class="row g-0 align-items-center bg-white" style="min-height: 500px;">
            <div class="col-md-6 text-center p-4">
                <div class="mascot-container border border-5 border-dark p-2">
                    <img src="https://via.placeholder.com/350" alt="Nut Mascot" class="img-fluid">
                </div>
            </div>

            <div class="col-md-6 p-5">
                <div class="login-card border border-2 border-dark rounded-4 p-4 text-center">
                    <h4 class="fw-bold">Welcome back!</h4>
                    <h2 class="fw-bold mb-4">LOGIN</h2>
                    
                    <div id="errorMessage" class="text-danger small mb-2"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <input type="text" id="username" class="form-control custom-input" placeholder="Email, username, or ID">
                        </div>
                        <div class="mb-4">
                            <input type="password" id="password" class="form-control custom-input" placeholder="Password">
                        </div>
                        <div class="form-check text-start mb-4">
                            <input class="form-check-input" type="checkbox" id="stayLoggedIn">
                            <label class="form-check-label small" for="stayLoggedIn">Stay logged in</label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="reset" class="btn btn-danger-custom px-5">Cancel</button>
                            <button type="button" id="loginBtn" onclick="handleLogin()" class="btn btn-blue-custom px-5">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <footer class="bg-dark text-white text-center py-1 small">
            Jude T. Yunus | 9-Sapphire ©2026
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
